<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThivashAI Chat 🤖</title>
<style>
body { font-family: Arial; margin:0; background:#f4f4f8; }
.chat-container { max-width:600px; margin:50px auto; background:#fff; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); display:flex; flex-direction:column; }
h2 { text-align:center; background:#4caf50; color:#fff; margin:0; padding:15px; }
.messages { flex:1; padding:20px; height:400px; overflow-y:auto; }
.user-msg { background:#4caf50; color:#fff; padding:10px 15px; border-radius:20px; margin-bottom:10px; max-width:80%; align-self:flex-end; }
.ai-msg { background:#e0e0e0; padding:10px 15px; border-radius:20px; margin-bottom:10px; max-width:80%; align-self:flex-start; }
.input-box { display:flex; border-top:1px solid #ddd; }
.input-box input { flex:1; border:none; padding:15px; font-size:16px; outline:none; }
.input-box button { padding:15px; background:#4caf50; border:none; color:#fff; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>
<div class="chat-container">
<h2>ThivashAI Chat 🤖</h2>
<div class="messages" id="messages"></div>
<div class="input-box">
<input type="text" id="userInput" placeholder="உங்கள் செய்தியை இடுங்கள்...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');

function appendMessage(msg, type){
  const div=document.createElement('div');
  div.className = type==='user'?'user-msg':'ai-msg';
  div.textContent = msg;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function sendMessage(){
  const text = userInput.value.trim();
  if(!text) return;
  appendMessage(text,'user');
  userInput.value='';

  // Demo AI reply (fake response)
  setTimeout(()=>{
    appendMessage("நான் இதற்கான பதில் தருகிறேன்: " + text,'ai');
  }, 500);
}

userInput.addEventListener("keypress", function(e){
  if(e.key==="Enter") sendMessage();
});
</script>
</body>
</html>
